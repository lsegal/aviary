version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    cooldown:
      default-days: 14
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: /
    cooldown:
      default-days: 14
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: /docs
    cooldown:
      default-days: 14
    schedule:
      interval: weekly

  - package-ecosystem: github-actions
    directory: /
    cooldown:
      default-days: 14
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /
    cooldown:
      default-days: 14
    schedule:
      interval: weekly
