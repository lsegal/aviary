name: CI Release Smoke

on:
  push:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'skills/**'
      - 'support/**'
      - 'web/**'
      - 'installer/**'
      - 'scripts/**'
      - 'go.mod'
      - 'go.sum'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.json'
      - 'vite.config.*'
      - 'tailwind.config.*'
      - 'postcss.config.*'
      - 'biome.json'
      - 'Dockerfile'
      - 'Dockerfile.dev'
      - '.github/workflows/ci-release-smoke.yml'
  pull_request:
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'skills/**'
      - 'support/**'
      - 'web/**'
      - 'installer/**'
      - 'scripts/**'
      - 'go.mod'
      - 'go.sum'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.json'
      - 'vite.config.*'
      - 'tailwind.config.*'
      - 'postcss.config.*'
      - 'biome.json'
      - 'Dockerfile'
      - 'Dockerfile.dev'
      - '.github/workflows/ci-release-smoke.yml'

permissions:
  contents: read

jobs:
  release-build:
    name: Release build smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:release -- --version v0.0.0-ci --targets linux/amd64,windows/amd64,darwin/arm64
      - run: test -f dist/release/aviary_v0.0.0-ci_linux_amd64.tar.gz
      - run: test -f dist/release/aviary_v0.0.0-ci_windows_amd64.tar.gz
      - run: test -f dist/release/aviary_v0.0.0-ci_darwin_arm64.tar.gz
      - run: test -f dist/release/checksums.txt
