name: CI Web

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.json'
      - 'vite.config.*'
      - 'playwright.config.*'
      - 'tailwind.config.*'
      - 'postcss.config.*'
      - 'biome.json'
      - 'eslint.config.*'
      - '*.js'
      - '*.cjs'
      - '*.mjs'
      - '*.ts'
      - '*.cts'
      - '*.mts'
      - '.github/workflows/ci-web.yml'
  pull_request:
    paths:
      - 'web/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.json'
      - 'vite.config.*'
      - 'playwright.config.*'
      - 'tailwind.config.*'
      - 'postcss.config.*'
      - 'biome.json'
      - 'eslint.config.*'
      - '*.js'
      - '*.cjs'
      - '*.mjs'
      - '*.ts'
      - '*.cts'
      - '*.mts'
      - '.github/workflows/ci-web.yml'

permissions:
  contents: read

jobs:
  web-lint:
    name: Web lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint:web

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:web
      - run: node scripts/build-go.mjs --output aviary
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
