name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  go-lint:
    name: "Lint: Go"
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go tool golangci-lint run ./...

  go-tests:
    name: "Test: Go (${{ matrix.os }})"
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go test ./...

  installer:
    name: "Test: Installer (${{ matrix.name }})"
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: POSIX
            os: ubuntu-latest
            prepare_shell: bash
            prepare_command: node scripts/mock-installer-fixture.mjs --root "$RUNNER_TEMP/mock-api" --version v9.9.9 --os linux --arch amd64 --baseUrl http://127.0.0.1:8765
            run_shell: bash
            run_command: |
              set -euo pipefail
              export HOME="$RUNNER_TEMP/home"
              export XDG_CONFIG_HOME="$RUNNER_TEMP/xdg"
              export AVIARY_API_BASE="http://127.0.0.1:8765"
              mkdir -p "$HOME" "$XDG_CONFIG_HOME"
              node scripts/mock-static-server.mjs --root "$RUNNER_TEMP/mock-api" --port 8765 > /tmp/aviary-installer-http.log 2>&1 &
              server_pid=$!
              trap 'kill "$server_pid"' EXIT
              sleep 1
              sh installer/install.sh --repo lsegal/aviary
              test -f "$XDG_CONFIG_HOME/aviary/bin/aviary"
              test -f "$HOME/.bashrc"
              grep -F "export PATH=\"$XDG_CONFIG_HOME/aviary/bin:\$PATH\"" "$HOME/.bashrc"
          - name: Windows
            os: windows-latest
            prepare_shell: pwsh
            prepare_command: node scripts/mock-installer-fixture.mjs --root "$env:RUNNER_TEMP/mock-api" --version v9.9.9 --os windows --arch amd64 --baseUrl http://127.0.0.1:8765
            run_shell: pwsh
            run_command: |
              $env:HOME = Join-Path $env:RUNNER_TEMP 'home'
              New-Item -ItemType Directory -Path $env:HOME -Force | Out-Null
              $server = Start-Process node -ArgumentList 'scripts/mock-static-server.mjs', '--root', (Join-Path $env:RUNNER_TEMP 'mock-api'), '--port', '8765' -PassThru -WindowStyle Hidden
              try {
                Start-Sleep -Seconds 1
                ./installer/install.ps1 -Version v9.9.9 -Repo lsegal/aviary -ApiBase http://127.0.0.1:8765
                $bin = Join-Path $env:HOME '.config\aviary\bin\aviary.exe'
                if (-not (Test-Path $bin)) {
                  throw "installer did not create $bin"
                }
                if (-not (($env:Path -split ';') -contains (Split-Path $bin))) {
                  throw "installer did not prepend the bin directory to PATH"
                }
              } finally {
                if ($server) {
                  Stop-Process -Id $server.Id -Force
                }
              }
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
      - name: Prepare mocked release API
        shell: ${{ matrix.prepare_shell }}
        run: ${{ matrix.prepare_command }}
      - name: Run installer against mock server
        shell: ${{ matrix.run_shell }}
        run: ${{ matrix.run_command }}

  release-smoke:
    name: "Test: Release Build"
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:release -- --version v0.0.0-ci --targets linux/amd64,windows/amd64,darwin/arm64
      - run: test -f dist/release/aviary_v0.0.0-ci_linux_amd64.tar.gz
      - run: test -f dist/release/aviary_v0.0.0-ci_windows_amd64.tar.gz
      - run: test -f dist/release/aviary_v0.0.0-ci_darwin_arm64.tar.gz
      - run: test -f dist/release/checksums.txt

  web-lint:
    name: "Lint: Web"
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint:web

  web-e2e:
    name: "Test: Web E2E"
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:web
      - run: node scripts/build-go.mjs --output aviary
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e

  docker:
    name: Docker
    needs:
      - go-lint
      - go-tests
      - installer
      - release-smoke
      - web-lint
      - web-e2e
    uses: ./.github/workflows/docker.yml
    secrets: inherit
    with:
      ref: ${{ github.sha }}
      branch_name: ${{ github.event_name == 'push' && github.ref_name || '' }}
      push_image: ${{ github.event_name != 'pull_request' }}
