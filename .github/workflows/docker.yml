name: Docker

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "aviary_version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "aviary_version=$(jq -r .version package.json).dev-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi
      - uses: docker/setup-buildx-action@v3
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.event_name == 'push' && github.ref_name == 'main' }}
      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            AVIARY_VERSION=${{ steps.version.outputs.aviary_version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
