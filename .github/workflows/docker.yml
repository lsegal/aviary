name: Docker

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:
    inputs:
      ref:
        required: false
        type: string
        default: ''
      aviary_version:
        required: false
        type: string
        default: ''
      branch_name:
        required: false
        type: string
        default: ''
      docker_tag:
        required: false
        type: string
        default: ''
      publish_latest:
        required: false
        type: boolean
        default: false
      push_image:
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_call' && inputs.ref || github.sha }}
      - id: prep
        shell: bash
        env:
          CALL_VERSION: ${{ inputs.aviary_version }}
          CALL_BRANCH: ${{ inputs.branch_name }}
          CALL_TAG: ${{ inputs.docker_tag }}
          INPUT_PUBLISH_LATEST: ${{ inputs.publish_latest }}
          INPUT_PUSH_IMAGE: ${{ inputs.push_image }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ -n "$CALL_VERSION" ]]; then
            aviary_version="$CALL_VERSION"
          else
            aviary_version="$(jq -r .version package.json).dev-$(git rev-parse --short HEAD)"
          fi

          branch_name="$CALL_BRANCH"
          if [[ -z "$branch_name" && "$GITHUB_EVENT_NAME" == "push" ]]; then
            branch_name="$GITHUB_REF_NAME"
          fi

          publish_latest="$INPUT_PUBLISH_LATEST"
          if [[ "$GITHUB_EVENT_NAME" == "push" && "$GITHUB_REF_NAME" == "main" ]]; then
            publish_latest="true"
          fi

          push_image="$INPUT_PUSH_IMAGE"
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            push_image="false"
          fi

          echo "aviary_version=$aviary_version" >> "$GITHUB_OUTPUT"
          echo "branch_name=$branch_name" >> "$GITHUB_OUTPUT"
          echo "docker_tag=$CALL_TAG" >> "$GITHUB_OUTPUT"
          echo "publish_latest=$publish_latest" >> "$GITHUB_OUTPUT"
          echo "push_image=$push_image" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=${{ steps.prep.outputs.branch_name }},enable=${{ steps.prep.outputs.branch_name != '' }}
            type=raw,value=${{ steps.prep.outputs.docker_tag }},enable=${{ steps.prep.outputs.docker_tag != '' }}
            type=raw,value=latest,enable=${{ steps.prep.outputs.publish_latest == 'true' }}
      - uses: docker/login-action@v3
        if: steps.prep.outputs.push_image == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ steps.prep.outputs.push_image == 'true' }}
          build-args: |
            AVIARY_VERSION=${{ steps.prep.outputs.aviary_version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
