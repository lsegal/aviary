name: Docker

on:
  push:
    branches: [main]
  pull_request:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Docker image
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0
      - id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            tag="$(git tag --points-at "${{ github.event.workflow_run.head_sha }}" | grep '^v' | head -n 1)"
            if [[ -z "$tag" ]]; then
              echo "No v* tag found for release commit ${{ github.event.workflow_run.head_sha }}" >&2
              exit 1
            fi
            echo "aviary_version=$tag" >> "$GITHUB_OUTPUT"
            echo "docker_tag=$tag" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "aviary_version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "docker_tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "aviary_version=$(jq -r .version package.json).dev-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
            echo "docker_tag=" >> "$GITHUB_OUTPUT"
          fi
      - uses: docker/setup-buildx-action@v3
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=${{ steps.version.outputs.docker_tag }},enable=${{ steps.version.outputs.docker_tag != '' }}
            type=raw,value=latest,enable=${{ github.event_name == 'push' && github.ref_name == 'main' }}
      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            AVIARY_VERSION=${{ steps.version.outputs.aviary_version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
