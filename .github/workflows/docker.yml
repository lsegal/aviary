name: Docker

on:
  workflow_call:
    inputs:
      ref:
        required: false
        type: string
        default: ''
      aviary_version:
        required: false
        type: string
        default: ''
      branch_name:
        required: false
        type: string
        default: ''
      docker_tag:
        required: false
        type: string
        default: ''
      publish_latest:
        required: false
        type: boolean
        default: false
      push_image:
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Docker image
    runs-on: ubuntu-latest
    env:
      SMOKE_IMAGE: aviary-smoke:${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_call' && inputs.ref || github.sha }}
      - id: prep
        shell: bash
        env:
          CALL_VERSION: ${{ inputs.aviary_version }}
          CALL_BRANCH: ${{ inputs.branch_name }}
          CALL_TAG: ${{ inputs.docker_tag }}
          INPUT_PUBLISH_LATEST: ${{ inputs.publish_latest }}
          INPUT_PUSH_IMAGE: ${{ inputs.push_image }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ -n "$CALL_VERSION" ]]; then
            aviary_version="$CALL_VERSION"
          else
            aviary_version="$(jq -r .version package.json).dev-$(git rev-parse --short HEAD)"
          fi

          branch_name="$CALL_BRANCH"
          if [[ -z "$branch_name" && "$GITHUB_EVENT_NAME" == "push" ]]; then
            branch_name="$GITHUB_REF_NAME"
          fi

          publish_latest="$INPUT_PUBLISH_LATEST"
          if [[ "$publish_latest" != "true" && "$CALL_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            publish_latest="true"
          fi

          push_image="$INPUT_PUSH_IMAGE"
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            push_image="false"
          fi

          echo "aviary_version=$aviary_version" >> "$GITHUB_OUTPUT"
          echo "branch_name=$branch_name" >> "$GITHUB_OUTPUT"
          echo "docker_tag=$CALL_TAG" >> "$GITHUB_OUTPUT"
          echo "publish_latest=$publish_latest" >> "$GITHUB_OUTPUT"
          echo "push_image=$push_image" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=${{ steps.prep.outputs.branch_name }},enable=${{ steps.prep.outputs.branch_name != '' }}
            type=raw,value=${{ steps.prep.outputs.docker_tag }},enable=${{ steps.prep.outputs.docker_tag != '' }}
            type=raw,value=latest,enable=${{ steps.prep.outputs.publish_latest == 'true' }}
      - name: Build smoke-test image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          build-args: |
            AVIARY_VERSION=${{ steps.prep.outputs.aviary_version }}
          tags: ${{ env.SMOKE_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke test container
        shell: bash
        run: |
          set -euo pipefail

          docker run -d --rm --name aviary-smoke -p 16677:16677 "${SMOKE_IMAGE}"
          cleanup() {
            docker logs aviary-smoke || true
            docker stop aviary-smoke || true
          }
          trap cleanup EXIT

          for _ in $(seq 1 30); do
            code="$(curl -ksS -o /dev/null -w "%{http_code}" https://127.0.0.1:16677/ || true)"
            if [[ "$code" != "000" ]]; then
              exit 0
            fi
            code="$(curl -ksS -o /dev/null -w "%{http_code}" https://127.0.0.1:16677/mcp || true)"
            if [[ "$code" != "000" ]]; then
              exit 0
            fi
            sleep 2
          done

          echo "Container did not start serving on port 16677" >&2
          exit 1
      - uses: docker/login-action@v4
        if: steps.prep.outputs.push_image == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push image
        if: steps.prep.outputs.push_image == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            AVIARY_VERSION=${{ steps.prep.outputs.aviary_version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
