name: Release

on:
  workflow_dispatch:
    inputs:
      level:
        description: Release level
        required: true
        type: choice
        default: patch
        options:
          - major
          - minor
          - patch
          - version
      version:
        description: Version to release (if version is selected)
        required: false
        type: string

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build and publish release assets
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    env:
      VERSION: ${{ inputs.level == 'version' && inputs.version || inputs.level }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Setup git credentials
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm package
      - run: pnpm release
      - id: version
        run: echo "tag=v$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

  docker:
    name: Publish Docker image
    needs: release
    uses: ./.github/workflows/docker.yml
    secrets: inherit
    with:
      ref: ${{ needs.release.outputs.tag }}
      aviary_version: ${{ needs.release.outputs.tag }}
      docker_tag: ${{ needs.release.outputs.tag }}
      push_image: true
