version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/lsegal/aviary

linters-settings:
  errcheck:
    exclude-functions:
      - fmt.Sscanf
  revive:
    rules:
      - name: exported
        severity: warning

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
    - text: "Error return value of .*(Close|Fprint).* is not checked"
      linters:
        - errcheck
